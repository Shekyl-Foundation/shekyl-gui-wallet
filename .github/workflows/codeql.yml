name: "CodeQL Analysis"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "30 5 * * 1"   # Every Monday at 5:30 AM UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-rust:
    name: Analyze Rust (Tauri backend + PQC)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create sidecar placeholder for Tauri build script
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/shekyld-x86_64-unknown-linux-gnu

      - name: Initialize CodeQL for Rust
        uses: github/codeql-action/init@v4
        with:
          languages: rust

      - name: Build Rust (Tauri backend)
        run: |
          cd src-tauri
          cargo build --release

      - name: Perform CodeQL Analysis (Rust)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"

  analyze-typescript:
    name: Analyze TypeScript / JavaScript (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL for TypeScript
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis (Frontend)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"