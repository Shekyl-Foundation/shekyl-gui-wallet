name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          case "$TAG" in *beta*|*alpha*|*rc*) PRERELEASE="--prerelease" ;; esac

          gh release create "$TAG" \
            --title "Shekyl Wallet $TAG" \
            --notes "See the assets below to download and install Shekyl Wallet for your platform.

          **Linux**: The \`.deb\` is universal (all dependencies statically linked). The \`.AppImage\` also works on any distro.

          Refer to the [installation guide](https://github.com/Shekyl-Foundation/shekyl-gui-wallet/blob/main/docs/INSTALLATION.md) for detailed instructions." \
            $PRERELEASE \
            --verify-tag || true

          RELEASE_ID=$(gh release view "$TAG" --json databaseId -q .databaseId)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    name: Build (${{ matrix.platform }}${{ matrix.tauri_target && format(' {0}', matrix.tauri_target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-2025-vs2026
            args: --bundles nsis
          - platform: macos-latest
            tauri_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Shekyl core (wallet FFI dependency)
        run: git clone --depth 1 --branch dev --recurse-submodules --shallow-submodules https://github.com/Shekyl-Foundation/shekyl-core.git ../shekyl-core

      # ── Linux: use contrib/depends for all third-party libs ──

      - name: Install Linux build tools and Tauri system deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool cmake autotools-dev automake \
            pkg-config ccache python3 gperf bsdmainutils curl bzip2 \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libdbus-1-dev libharfbuzz-dev libudev-dev

      - name: Compute depends cache key
        if: startsWith(matrix.platform, 'ubuntu')
        id: depends-key
        run: echo "hash=$(cat ../shekyl-core/contrib/depends/packages/*.mk | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache depends prefix
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v4
        id: depends-cache
        with:
          path: ${{ github.workspace }}/../shekyl-core/contrib/depends/built
          key: depends-x86_64-linux-gnu-${{ steps.depends-key.outputs.hash }}
          restore-keys: |
            depends-x86_64-linux-gnu-

      - name: Build shekyl-core with depends (all deps from source, static)
        if: startsWith(matrix.platform, 'ubuntu')
        working-directory: ../shekyl-core
        run: make depends target=x86_64-unknown-linux-gnu -j$(nproc)

      - name: Place sidecar binary (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          mkdir -p src-tauri/binaries
          cp ../shekyl-core/build/x86_64-unknown-linux-gnu/release/bin/shekyld \
             src-tauri/binaries/shekyld-x86_64-unknown-linux-gnu

      # ── macOS: Homebrew for now (depends cross-build is stretch goal) ──

      - name: Install macOS build dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install --quiet cmake boost hidapi openssl libpgm \
            miniupnpc expat protobuf abseil ccache libsodium unbound

      - name: Build Shekyl wallet library (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          OPENSSL_ROOT_DIR: ${{ runner.temp }}/_brew_openssl
        run: |
          ln -sf "$(brew --prefix openssl@3)" "$OPENSSL_ROOT_DIR"
          cmake -S ../shekyl-core -B ../shekyl-core/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"
          cmake --build ../shekyl-core/build --target daemon wallet -- -j$(sysctl -n hw.logicalcpu)

      - name: Place sidecar binary (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p src-tauri/binaries
          cp ../shekyl-core/build/bin/shekyld \
             src-tauri/binaries/shekyld-aarch64-apple-darwin

      # ── Common: Node, Rust, frontend ──

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && matrix.tauri_target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # ── Windows: vcpkg + MSVC ──

      - name: vcpkg cache
        if: startsWith(matrix.platform, 'windows')
        uses: actions/cache@v5
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\installed
            C:\vcpkg\archives
          key: vcpkg-x64-windows-static-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Install Windows build dependencies
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,C:\vcpkg\archives,readwrite
        run: |
          vcpkg install --triplet x64-windows-static --overlay-ports="${{ github.workspace }}/../shekyl-core/vcpkg-overlay/ports" boost openssl libsodium libusb lmdb

      - name: Build Shekyl wallet library (Windows / MSVC)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          cmake -S ..\shekyl-core -B ..\shekyl-core\build `
            -G "Visual Studio 18 2026" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DSTATIC=ON `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTS=OFF `
            -DSTACK_TRACE=OFF `
            -DUSE_DEVICE_TREZOR=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build ..\shekyl-core\build --config Release --target daemon wallet --parallel 2

      - name: Place sidecar binary (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Copy-Item ..\shekyl-core\build\bin\Release\shekyld.exe `
                    src-tauri\binaries\shekyld-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: npm ci

      # ── Linux: build Tauri and upload artifacts manually ──

      - name: Build Tauri app (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          SHEKYL_BUILD_DIR: ${{ github.workspace }}/../shekyl-core/build/x86_64-unknown-linux-gnu/release
          SHEKYL_DEPENDS_PREFIX: ${{ github.workspace }}/../shekyl-core/contrib/depends/x86_64-unknown-linux-gnu
        run: npx tauri build

      - name: Upload Linux .deb to release
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          DEB=$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)
          if [ -z "$DEB" ]; then
            echo "::error::No .deb artifact found after tauri build"
            exit 1
          fi
          gh release upload "$TAG" "$DEB" --clobber

      - name: Upload Linux AppImage to release
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::No .AppImage artifact found after tauri build"
            exit 1
          fi
          gh release upload "$TAG" "$APPIMAGE" --clobber

      # ── macOS / Windows: use tauri-action with existing release ──

      - name: Build and upload (macOS / Windows)
        if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEKYL_BUILD_DIR: ${{ format('{0}/../shekyl-core/build', github.workspace) }}
          VCPKG_INSTALLATION_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
