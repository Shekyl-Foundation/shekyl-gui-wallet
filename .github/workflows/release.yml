name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build (${{ matrix.platform }}${{ matrix.tauri_target && format(' {0}', matrix.tauri_target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-latest
            tauri_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13
            tauri_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Shekyl core (wallet FFI dependency)
        run: git clone --depth 1 --branch dev --recurse-submodules --shallow-submodules https://github.com/Shekyl-Foundation/shekyl-core.git ../Shekyl

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential cmake pkg-config ccache \
            libboost-all-dev libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libhidapi-dev libusb-1.0-0-dev \
            libprotobuf-dev protobuf-compiler libudev-dev

      - name: Install macOS build dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install --quiet cmake boost hidapi openssl zmq libpgm \
            miniupnpc expat protobuf abseil ccache libsodium unbound

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && matrix.tauri_target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Build Shekyl wallet library (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cmake -S ../Shekyl -B ../Shekyl/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF
          cmake --build ../Shekyl/build -- -j$(nproc)

      - name: Build Shekyl wallet library (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          OPENSSL_ROOT_DIR: ${{ runner.temp }}/_brew_openssl
        run: |
          ln -sf "$(brew --prefix openssl@3)" "$OPENSSL_ROOT_DIR"
          cmake -S ../Shekyl -B ../Shekyl/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"
          cmake --build ../Shekyl/build -- -j$(sysctl -n hw.logicalcpu)

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEKYL_BUILD_DIR: ${{ matrix.platform != 'windows-latest' && format('{0}/../Shekyl/build', github.workspace) || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Shekyl Wallet ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download and install Shekyl Wallet for your platform.

            Refer to the [installation guide](https://github.com/Shekyl-Foundation/shekyl-gui-wallet/blob/main/docs/INSTALLATION.md) for detailed instructions.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
