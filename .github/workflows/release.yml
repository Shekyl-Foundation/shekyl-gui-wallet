name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Shekyl Wallet ${{ github.ref_name }}"
          body: |
            See the assets below to download and install Shekyl Wallet for your platform.

            **Linux**: The `.deb` is universal (all dependencies statically linked). The `.AppImage` also works on any distro.

            Refer to the [installation guide](https://github.com/Shekyl-Foundation/shekyl-gui-wallet/blob/main/docs/INSTALLATION.md) for detailed instructions.
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          draft: false

  build:
    needs: create-release
    name: Build (${{ matrix.platform }}${{ matrix.tauri_target && format(' {0}', matrix.tauri_target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-latest
            tauri_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Shekyl core (wallet FFI dependency)
        run: git clone --depth 1 --branch main --recurse-submodules --shallow-submodules https://github.com/Shekyl-Foundation/shekyl-core.git ../Shekyl

      # ── Linux: use contrib/depends for all third-party libs ──

      - name: Install Linux build tools and Tauri system deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool cmake autotools-dev automake \
            pkg-config ccache python3 gperf bsdmainutils curl bzip2 \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libdbus-1-dev libharfbuzz-dev libudev-dev

      - name: Compute depends cache key
        if: startsWith(matrix.platform, 'ubuntu')
        id: depends-key
        run: echo "hash=$(cat ../Shekyl/contrib/depends/packages/*.mk | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache depends prefix
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v4
        id: depends-cache
        with:
          path: ${{ github.workspace }}/../Shekyl/contrib/depends/built
          key: depends-x86_64-linux-gnu-${{ steps.depends-key.outputs.hash }}
          restore-keys: |
            depends-x86_64-linux-gnu-

      - name: Build shekyl-core with depends (all deps from source, static)
        if: startsWith(matrix.platform, 'ubuntu')
        working-directory: ../Shekyl
        run: make depends target=x86_64-unknown-linux-gnu -j$(nproc)

      # ── macOS: Homebrew for now (depends cross-build is stretch goal) ──

      - name: Install macOS build dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install --quiet cmake boost hidapi openssl zmq libpgm \
            miniupnpc expat protobuf abseil ccache libsodium unbound

      - name: Build Shekyl wallet library (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          OPENSSL_ROOT_DIR: ${{ runner.temp }}/_brew_openssl
        run: |
          ln -sf "$(brew --prefix openssl@3)" "$OPENSSL_ROOT_DIR"
          cmake -S ../Shekyl -B ../Shekyl/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"
          cmake --build ../Shekyl/build -- -j$(sysctl -n hw.logicalcpu)

      # ── Common: Node, Rust, frontend ──

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && matrix.tauri_target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # ── Linux: build Tauri and upload artifacts manually ──

      - name: Build Tauri app (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          SHEKYL_BUILD_DIR: ${{ github.workspace }}/../Shekyl/build/x86_64-unknown-linux-gnu/release
          SHEKYL_DEPENDS_PREFIX: ${{ github.workspace }}/../Shekyl/contrib/depends/x86_64-unknown-linux-gnu
        run: npx tauri build

      - name: Upload Linux .deb to release
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          DEB=$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)
          if [ -n "$DEB" ]; then
            gh release upload "$TAG" "$DEB" --clobber
          fi

      - name: Upload Linux AppImage to release
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            gh release upload "$TAG" "$APPIMAGE" --clobber
          fi

      # ── macOS / Windows: use tauri-action with existing release ──

      - name: Build and upload (macOS / Windows)
        if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEKYL_BUILD_DIR: ${{ matrix.platform != 'windows-latest' && format('{0}/../Shekyl/build', github.workspace) || '' }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
